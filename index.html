<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Convite de Casamento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: #f0f4f7;
            /* Permite scroll em todos os sentidos */
            overflow: auto;
            /* Flex para centralizar inicialmente */
            display: flex;
            justify-content: center;
            align-items: center;
            overscroll-behavior: none;
            /* Garante que o body ocupa pelo menos o espaço total */
            min-height: 100%;
            min-width: 100%;
        }
        
        .convite-container { 
            position: relative;
            width: 85vw; 
            max-width: 600px; 
            aspect-ratio: 297/210; 
            transform-style: preserve-3d; 
            transition: transform 1.2s ease-in-out;
            transform: scale(1.6);
            touch-action: pan-x pan-y pinch-zoom;
            /* Margens gigantes para garantir espaço de manobra total */
            margin: 50vh 50vw; 
            flex-shrink: 0;
        }

        .abrir.convite-container { 
            transform: scale(1.44); 
        }

        .porta-3d { position: absolute; top: 0; width: 25%; height: 100%; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .porta-esquerda { left: 25%; transform-origin: left; }
        .porta-direita { right: 25%; transform-origin: right; }
        
        .abrir .porta-esquerda { transform: rotateY(-180deg); }
        .abrir .porta-direita { transform: rotateY(180deg); }

        .painel-central { position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; background: url('003.jpg') center/cover; cursor: pointer; }

        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }

        .face-frente { background: url('005.jpg'); background-size: 200% 100%; }
        .porta-esquerda .face-frente { background-position: left; cursor: pointer; }
        .porta-direita .face-frente { background-position: right; cursor: pointer; }

        .porta-esquerda .face-verso { background: url('001.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; }
        .porta-direita .face-verso { background: url('002.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; z-index: 50; }

        .qr-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: block; }
    </style>
</head>
<body>

    <div class="convite-container" id="convite">
        <div class="painel-central" onclick="document.getElementById('convite').classList.remove('abrir')"></div>
        
        <div class="porta-3d porta-esquerda" onclick="document.getElementById('convite').classList.remove('abrir')">
            <div class="face face-frente"></div>
            <div class="face face-verso"></div>
        </div>
        
        <div class="porta-3d porta-direita" onclick="if(!document.getElementById('convite').classList.contains('abrir')) { document.getElementById('convite').classList.add('abrir'); }">
            <div class="face face-frente"></div>
            <div class="face face-verso">
                <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="qr-link"></a>
            </div>
        </div>
    </div>

    <script>
        // Ajuste para garantir que o Safari (iOS) interpreta corretamente a altura
        function setFullHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setFullHeight);
        setFullHeight();
    </script>
</body>
</html>
