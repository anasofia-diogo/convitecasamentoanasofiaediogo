<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Convite Final - Otimizado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            width: 100vw; 
            height: 100dvh; 
            background-color: #f0f4f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: auto; 
            /* CORREÇÃO 2: Adicionada perspetiva para o efeito 3D real não ficar "plano" */
            perspective: 1200px; 
        }
        
        .convite-container { 
            position: relative; 
            width: 95vw; 
            aspect-ratio: 297/210; 
            transform-style: preserve-3d; 
            transition: transform 1.2s ease-in-out; 
            transform: scale(2.0); 
            touch-action: manipulation;
            cursor: pointer;
        }

        .convite-container.abrir { 
            transform: scale(1.35) translateX(12%); 
        }

        /* --- ZONAS E ESTRUTURA VISUAL --- */
        
        .zona-azul-centro { 
            position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; 
            background-image: url('003.jpg'); background-size: cover; background-position: center; 
        }
        
        .porta { 
            position: absolute; top: 0; height: 100%; width: 25%; z-index: 10; 
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
            /* CORREÇÃO 1: Evita bugs visuais nas portas durante a rotação no Safari/iOS */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        .face { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden; 
        }
        .face-verso { transform: rotateY(180deg); }

        .porta-esq { left: 25%; transform-origin: left; }
        .porta-dir { left: 50%; transform-origin: right; }
        
        .zona-vermelha { background-image: url('005.jpg'); background-size: 200% 100%; background-position: left; }
        .zona-amarela  { background-image: url('005.jpg'); background-size: 200% 100%; background-position: right; }
        .zona-lilas    { background-image: url('001.jpg'); background-size: cover; background-position: center; background-color: white; }
        .zona-rosa     { background-image: url('002.jpg'); background-size: cover; background-position: center; background-color: white; }

        .abrir .porta-esq { transform: rotateY(-180deg); }
        .abrir .porta-dir { transform: rotateY(180deg); }
        
        .link-oculto { 
            position: absolute; bottom: 0; width: 100%; height: 50%; z-index: 100; 
            /* CORREÇÃO 3: Força o link fisicamente para a frente no espaço 3D para não perder o clique */
            transform: translateZ(10px);
        }
    </style>
</head>
<body>

    <div class="convite-container" id="convite" onclick="this.classList.toggle('abrir')">
        <div class="zona-azul-centro"></div>
        
        <div class="porta porta-esq">
            <div class="face face-frente zona-vermelha"></div>
            <div class="face face-verso zona-lilas"></div>
        </div>
        
        <div class="porta porta-dir">
            <div class="face face-frente zona-amarela"></div>
            <div class="face face-verso zona-rosa">
                <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="link-oculto" onclick="event.stopPropagation()"></a>
            </div>
        </div>
    </div>

</body>
</html>
