<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Ana Sofia & Diogo</title>

    <meta property="og:url" content="https://anasofia-diogo.github.io/convitecasamentoanasofiaediogo/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="O Nosso Casamento" />
    <meta property="og:description" content="Bem-vindos ao nosso site de casamento!" />
    <meta property="og:image" content="https://anasofia-diogo.github.io/convitecasamentoanasofiaediogo/social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Convite Final - Estrutura Blindada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            width: 100vw; height: 100dvh; background-color: #f0f4f7; 
            display: flex; justify-content: center; align-items: center; overflow: auto; 
        }
        
        .convite-container { 
            position: relative; width: 95vw; aspect-ratio: 297/210; 
            transform-style: preserve-3d; transition: transform 1.2s ease-in-out; 
            transform: scale(2.0); touch-action: manipulation; cursor: pointer;
        }

        .convite-container.abrir { transform: scale(1.35) translateX(12%); }

        /* --- ZONAS E PORTAS (CONJUNTO 3D) --- */
        .zona-azul-centro { 
            position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; 
            background-image: url('003.jpg'); background-size: cover; background-position: center; 
        }
        
        .porta { 
            position: absolute; top: 0; height: 100%; width: 25%; z-index: 10; 
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; -webkit-backface-visibility: hidden; backface-visibility: hidden;
        }
        
        .face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; }
        .face-verso { transform: rotateY(180deg); }

        .porta-esq { left: 25%; transform-origin: left; }
        .porta-dir { left: 50%; transform-origin: right; }
        
        .zona-vermelha { background-image: url('005.jpg'); background-size: 200% 100%; background-position: left; }
        .zona-amarela  { background-image: url('005.jpg'); background-size: 200% 100%; background-position: right; }
        .zona-lilas    { background-image: url('001.jpg'); background-size: cover; background-position: center; }
        .zona-rosa     { background-image: url('002.jpg'); background-size: cover; background-position: center; }

        .abrir .porta-esq { transform: rotateY(-180deg); }
        .abrir .porta-dir { transform: rotateY(180deg); }
        
        /* --- A TUA CORREÇÃO CIRÚRGICA --- */
        .link-sobreposto {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            z-index: 100; pointer-events: none; /* Inativo enquanto fechado */
        }
        
        .abrir .link-sobreposto {
            pointer-events: auto; /* Ativo apenas quando aberto */
        }
    </style>
</head>
<body>

    <div class="convite-container" id="convite" onclick="this.classList.toggle('abrir')">
        <div class="zona-azul-centro"></div>
        
        <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="link-sobreposto" onclick="event.stopPropagation()"></a>
        
        <div class="porta porta-esq">
            <div class="face face-frente zona-vermelha"></div>
            <div class="face face-verso zona-lilas"></div>
        </div>
        
        <div class="porta porta-dir">
            <div class="face face-frente zona-amarela"></div>
            <div class="face face-verso zona-rosa"></div>
        </div>
    </div>

</body>
</html>
