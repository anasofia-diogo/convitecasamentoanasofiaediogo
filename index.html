<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Convite de Casamento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f0f4f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
           padding: 20px; /* Espaço para não ficar colado */
            display: block; /* Alterado de flex para permitir fluxo normal */
            overflow-x: auto; /* Permite navegar lateralmente se necessário */
            cursor: pointer;
        }
        
        .convite-container { 
            position: relative; 
            width: 95vw; 
            max-width: 1000px; 
            aspect-ratio: 297/210; 
            transform-style: preserve-3d; 
            transition: transform 1.8s ease-in-out; /* Transição suave */
            
            /* ZOOM INICIAL: Mais forte na página inicial (Capa) */
            transform: scale(1.3);
            touch-action: pan-x pan-y pinch-zoom;
        }

        /* ZOOM AO ABRIR: Afasta apenas o mínimo (0.5 a 1 de diferença) */
        .abrir.convite-container { 
            /* Começou em 1.3, afasta para 1.2 (uma diferença de 0.1) */
            transform: scale(1.2); 
        }

        /* Ajustes específicos para Telemóvel (se necessário) */
        @media (max-width: 768px) {
            .convite-container { transform: scale(1.4); } /* Mais forte ainda no tlm */
            .abrir.convite-container { transform: scale(1.3); } /* Afasta ligeiramente */
        }
        
        /* ZONA 1: Painel Central (Fundo) */
        .painel-central { position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; background: url('003.jpg') center/cover; }

        .porta-3d { position: absolute; top: 0; width: 25%; height: 100%; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .porta-esquerda { left: 25%; transform-origin: left; }
        .porta-direita { right: 25%; transform-origin: right; }
        
        .abrir .porta-esquerda { transform: rotateY(-180deg); }
        .abrir .porta-direita { transform: rotateY(180deg); }

        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }

        /* ZONAS 2 e 3: Capas (005) */
        .face-frente { background: url('005.jpg') center/cover; }
        .porta-esquerda .face-frente { background-position: left; }
        .porta-direita .face-frente { background-position: right; }

        /* ZONAS 4 e 5: Versos (001 e 002) */
        .porta-esquerda .face-verso { 
            background: url('001.jpg') center/contain no-repeat; 
            transform: rotateY(180deg); 
            background-color: white; 
        }

        .porta-direita .face-verso { 
            background: url('002.jpg') center/contain no-repeat; 
            transform: rotateY(180deg); 
            background-color: white; 
            z-index: 50;
        }

        .qr-link { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 100; 
            display: block;
        }
    </style>
</head>
<body onclick="document.getElementById('convite').classList.toggle('abrir')">

    <div class="convite-container" id="convite">
        <div class="painel-central"></div>
        
        <div class="porta-3d porta-esquerda">
            <div class="face face-frente"></div>
            <div class="face face-verso"></div>
        </div>
        
        <div class="porta-3d porta-direita">
            <div class="face face-frente"></div>
            <div class="face face-verso">
                <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="qr-link"></a>
            </div>
        </div>
    </div>

</body>
</html>
