<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Convite de Casamento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f0f4f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            /* Permitir scroll */
            overflow: auto;
            touch-action: manipulation;
        }
        
        .convite-container { 
            position: relative; 
            width: 90vw; 
            max-width: 900px; 
            aspect-ratio: 297/210; 
            transform-style: preserve-3d; 
            transition: transform 1.5s ease-in-out;
            transform: scale(1.0); 
            /* Permite ao telemóvel entender gestos */
            touch-action: pan-x pan-y;
        }

        .abrir.convite-container { transform: scale(0.9); }

        /* Botão Fechar */
        .btn-fechar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 200;
            display: none;
            cursor: pointer;
        }
        .abrir .btn-fechar { display: block; }

        .painel-central { position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; background: url('003.jpg') center/cover; }

        .porta-3d { position: absolute; top: 0; width: 25%; height: 100%; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; cursor: pointer; }
        .porta-esquerda { left: 25%; transform-origin: left; }
        .porta-direita { right: 25%; transform-origin: right; }
        
        .abrir .porta-esquerda { transform: rotateY(-180deg); }
        .abrir .porta-direita { transform: rotateY(180deg); }

        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }

        .face-frente { background: url('005.jpg') center/cover; }
        .porta-esquerda .face-frente { background-position: left; }
        .porta-direita .face-frente { background-position: right; }

        .porta-esquerda .face-verso { background: url('001.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; }
        .porta-direita .face-verso { background: url('002.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; z-index: 50; }

        .qr-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: block; }
    </style>
</head>
<body>

    <div class="convite-container" id="convite">
        <div class="btn-fechar" onclick="event.stopPropagation(); document.getElementById('convite').classList.remove('abrir')">Fechar</div>
        
        <div class="painel-central"></div>
        
        <div class="porta-3d porta-esquerda" onclick="document.getElementById('convite').classList.add('abrir')">
            <div class="face face-frente"></div>
            <div class="face face-verso"></div>
        </div>
        
        <div class="porta-3d porta-direita" onclick="document.getElementById('convite').classList.add('abrir')">
            <div class="face face-frente"></div>
            <div class="face face-verso">
                <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="qr-link"></a>
            </div>
        </div>
    </div>

</body>
</html>
