<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Convite de Casamento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #f0f4f7;
            overflow: hidden; /* Mantém o convite fixo no centro */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        
        .convite-container { 
            position: relative;
            width: 600px; 
            height: 320px; 
            transform-style: preserve-3d; 
            transition: transform 1.2s ease-in-out;
            transform: scale(1.0); /* Ajusta se quiseres maior ou menor */
            flex-shrink: 0;
            margin-top: 50px; /* Margem superior para o convite não bater no topo */
            touch-action: auto !important; /* Permite zoom e arrastar */
            margin-left: auto;
    margin-right: auto;
        }

        .abrir.convite-container { transform: scale(1.0); }

        .porta-3d { position: absolute; top: 0; width: 25%; height: 100%; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .porta-esquerda { left: 25%; transform-origin: left; }
        .porta-direita { right: 25%; transform-origin: right; }
        
        .abrir .porta-esquerda { transform: rotateY(-180deg); }
        .abrir .porta-direita { transform: rotateY(180deg); }

        .painel-central { position: absolute; top: 0; left: 25%; width: 50%; height: 100%; z-index: 1; background: url('003.jpg') center/cover; cursor: pointer; }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .face-frente { background: url('005.jpg'); background-size: 200% 100%; }
        .porta-esquerda .face-frente { background-position: left; }
        .porta-direita .face-frente { background-position: right; }
        .porta-esquerda .face-verso { background: url('001.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; }
        .porta-direita .face-verso { background: url('002.jpg') center/contain no-repeat; transform: rotateY(180deg); background-color: white; z-index: 50; }
        .qr-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: block; }
    </style>
</head>
<body>

    <div class="convite-container" id="convite">
        <div class="painel-central" onclick="document.getElementById('convite').classList.remove('abrir')"></div>
        
        <div class="porta-3d porta-esquerda" onclick="document.getElementById('convite').classList.remove('abrir')">
            <div class="face face-frente"></div>
            <div class="face face-verso"></div>
        </div>
        
        <div class="porta-3d porta-direita" onclick="if(!document.getElementById('convite').classList.contains('abrir')) { document.getElementById('convite').classList.add('abrir'); }">
            <div class="face face-frente"></div>
            <div class="face face-verso">
                <a href="https://sites.google.com/view/anasofiaediogo2026/p%C3%A1gina-inicial" target="_blank" class="qr-link"></a>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Pequeno atraso para garantir que o render 3D estabilizou
            setTimeout(() => {
                const container = document.getElementById('convite');
                // Calcula a posição do centro do container
                const containerWidth = container.offsetWidth;
                const windowWidth = window.innerWidth;
                
                // Define o scroll para que o meio do convite coincida com o meio do ecrã
                // Se estiver deslocado para a direita, ajustamos aqui:
                const scrollX = (containerWidth / 2) - (windowWidth / 2);
                
                window.scrollTo({
                    left: scrollX, 
                    top: 0,
                    behavior: 'instant' // 'instant' evita animações de scroll ao abrir
                });
            }, 200); // 200 milissegundos é o tempo ideal para estabilizar
        };
    </script>
</body>
</html>
